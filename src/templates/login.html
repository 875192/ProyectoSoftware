<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión</title>
    <link rel="stylesheet" href="../styles/login.css">
</head>
<body>
    <main class="login-container">
        <div class="login-card">
            <!-- Encabezado -->
            <header class="login-header">
                <div class="login-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                    </svg>
                </div>
                <h1>Iniciar sesión</h1>
                <p class="login-subtitle">Introduce tus credenciales para continuar.</p>
            </header>

            <!-- Formulario de login -->
            <form id="login-form" class="login-form" novalidate>
                <!-- Campo: Usuario o correo -->
                <div class="form-group">
                    <label for="usuario">Usuario o correo</label>
                    <input 
                        type="text" 
                        id="usuario" 
                        name="usuario" 
                        placeholder="usuario@correo.com"
                        autocomplete="username"
                        aria-describedby="usuario-error"
                        required
                    >
                    <span id="usuario-error" class="error-message" role="alert" aria-live="polite"></span>
                </div>

                <!-- Campo: Contraseña -->
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <div class="password-wrapper">
                        <input 
                            type="password" 
                            id="password" 
                            name="password" 
                            placeholder="••••••••"
                            autocomplete="current-password"
                            aria-describedby="password-error"
                            required
                        >
                        <button 
                            type="button" 
                            id="toggle-password" 
                            class="toggle-password-btn"
                            aria-label="Mostrar contraseña"
                        >
                            Mostrar
                        </button>
                    </div>
                    <span id="password-error" class="error-message" role="alert" aria-live="polite"></span>
                </div>

                <!-- Checkbox: Recordarme -->
                <div class="form-group form-group--inline">
                    <input type="checkbox" id="recordarme" name="recordarme">
                    <label for="recordarme">Recordarme</label>
                </div>

                <!-- Enlace: ¿Olvidaste tu contraseña? -->
                <div class="form-group">
                    <a href="forgot_password.html" class="forgot-password-link">
                        ¿Olvidaste tu contraseña?
                    </a>
                </div>

                <!-- Botón principal -->
                <button type="submit" id="btn-acceder" class="btn-primary">
                    Acceder
                </button>

                <!-- Zona de mensajes/estado -->
                <div id="login-status" class="login-status" role="status" aria-live="polite"></div>

                <!-- Link a crear cuenta -->
                <div class="form-group form-group--center">
                    <span class="text-muted">¿No tienes cuenta?</span>
                    <a href="register.html" class="link-secondary">Crear cuenta</a>
                </div>
            </form>
        </div>
    </main>

    <script src="../utils/login.js"></script>
</body>
</html>
